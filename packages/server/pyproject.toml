[project]
name = "frameverse-server"
version = "0.1.0"
description = "Backend service for Frameverse"
readme = "README.md"
requires-python = ">=3.12"
authors = [{ name = "Egor Machnev" }, { name = "Alexey Volkov" }]
dependencies = [
    "advanced-alchemy[cli]>=1.8.2",
    "aioboto3>=15.5.0",
    "asyncpg>=0.31.0",
    "httpx>=0.28.1",
    "langfuse>=4.0.0",
    "litestar[pydantic]>=2.21.1",
    "pgvector>=0.4.2",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.13.1",
    "scenedetect[opencv]>=0.6.7.1",
    "structlog>=25.5.0",
    "temporalio>=1.23.0",
    "uvicorn[standard]>=0.41.0",
]

[project.urls]
homepage = "https://frameverse.ru/"
repository = "https://github.com/machnevegor/frameverse/tree/main/packages/server"

[tool.uv]
package = false
default-groups = "all"

[tool.ruff]
line-length = 120
lint.extend-select = ["COM", "I", "PL", "UP"]
lint.extend-ignore = ["COM812", "PLC0415", "PLR"]
target-version = "py312"

[dependency-groups]
dev = ["ipykernel>=7.2.0", "ipywidgets>=8.1.8"]
lint = ["ruff>=0.15.5"]
test = ["pytest>=9.0.2", "pytest-asyncio>=1.3.0"]
