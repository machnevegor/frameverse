services:
  client:
    build:
      context: packages/client
    env_file:
      - .env
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network

      - traefik.http.routers.client-http.rule=Host(`frameverse.ru`)
      - traefik.http.routers.client-http.entrypoints=web
      - traefik.http.routers.client-http.middlewares=redirect-to-https@file

      - traefik.http.routers.client-https.rule=Host(`frameverse.ru`)
      - traefik.http.routers.client-https.entrypoints=websecure
      - traefik.http.routers.client-https.tls=true
      - traefik.http.routers.client-https.tls.certresolver=letsencrypt
      - traefik.http.routers.client-https.service=client-svc

      - traefik.http.services.client-svc.loadbalancer.server.port=4173
    networks:
      - dokploy-network
    ports:
      - "4173:4173"
    restart: unless-stopped

  server:
    build:
      context: packages/server
    env_file:
      - .env
    command: ["uv", "run", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      temporal-create-namespace:
        condition: service_completed_successfully
      server-migrate:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network

      - traefik.http.routers.server-http.rule=Host(`frameverse.ru`) && PathPrefix(`/api`)
      - traefik.http.routers.server-http.entrypoints=web
      - traefik.http.routers.server-http.middlewares=redirect-to-https@file

      - traefik.http.routers.server-https.rule=Host(`frameverse.ru`) && PathPrefix(`/api`)
      - traefik.http.routers.server-https.entrypoints=websecure
      - traefik.http.routers.server-https.tls=true
      - traefik.http.routers.server-https.tls.certresolver=letsencrypt
      - traefik.http.routers.server-https.service=server-svc

      - traefik.http.services.server-svc.loadbalancer.server.port=8000
    networks:
      - dokploy-network
    ports:
      - "8000:8000"
    restart: unless-stopped

  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    container_name: temporal-admin-tools
    restart: on-failure:6
    env_file:
      - .env
    environment:
      - DB=postgres12
      - DB_PORT=${TEMPORAL_DB_PORT:-5432}
      - POSTGRES_USER=${TEMPORAL_DB_USER}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD}
      - POSTGRES_SEEDS=${TEMPORAL_DB_HOST}
      - SQL_PASSWORD=${TEMPORAL_DB_PASSWORD}
    networks:
      - dokploy-network
    volumes:
      - ./compose/scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/setup-postgres.sh

  temporal:
    image: temporalio/server:${TEMPORAL_VERSION}
    container_name: temporal
    depends_on:
      temporal-admin-tools:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      - DB=postgres12
      - DB_PORT=${TEMPORAL_DB_PORT:-5432}
      - POSTGRES_USER=${TEMPORAL_DB_USER}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD}
      - POSTGRES_SEEDS=${TEMPORAL_DB_HOST}
      - BIND_ON_IP=0.0.0.0
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    networks:
      - dokploy-network
    ports:
      - "7233:7233"
    volumes:
      - ./compose/dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 60
    restart: unless-stopped

  temporal-create-namespace:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    container_name: temporal-create-namespace
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - DEFAULT_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
    networks:
      - dokploy-network
    volumes:
      - ./compose/scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh

  temporal-ui:
    container_name: temporal-ui
    depends_on:
      temporal:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    networks:
      - dokploy-network
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    build:
      context: packages/server
    env_file:
      - .env
    command: ["uv", "run", "python", "-m", "src.workers.run"]
    depends_on:
      temporal-create-namespace:
        condition: service_completed_successfully
      server-migrate:
        condition: service_completed_successfully
    networks:
      - dokploy-network
    restart: unless-stopped

  server-migrate:
    build:
      context: packages/server
    env_file:
      - .env
    command: ["sh", "-c", "LITESTAR_APP=src.api.app:create_app uv run litestar database upgrade"]
    networks:
      - dokploy-network
    restart: "no"

networks:
  dokploy-network:
    external: true
